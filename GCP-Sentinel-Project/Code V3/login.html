<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCP Sentinel — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #020b14;
  --panel: #040f1c;
  --border: #0d3a5c;
  --border-bright: #1a6b9e;
  --accent: #00d4ff;
  --accent2: #00ff9d;
  --danger: #ff3d3d;
  --text: #c8e8ff;
  --text-dim: #4a7a9b;
  --mono: 'Share Tech Mono', monospace;
  --display: 'Orbitron', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Animated grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,212,255,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,.05) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: gridMove 20s linear infinite;
  pointer-events: none;
}
@keyframes gridMove {
  0% { background-position: 0 0; }
  100% { background-position: 50px 50px; }
}

/* Scanlines */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.15) 2px, rgba(0,0,0,.15) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* Glowing orbs */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.12;
  pointer-events: none;
  animation: orbFloat 8s ease-in-out infinite;
}
.orb1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; animation-delay: 0s; }
.orb2 { width: 300px; height: 300px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: 4s; }
@keyframes orbFloat {
  0%,100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(20px, -20px) scale(1.05); }
}

.login-wrap {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

/* Logo */
.logo-area {
  text-align: center;
  margin-bottom: 36px;
}

.hex-logo {
  display: inline-block;
  margin-bottom: 20px;
  animation: rotateSlow 12s linear infinite;
}
@keyframes rotateSlow {
  0% { filter: drop-shadow(0 0 8px rgba(0,212,255,.5)); }
  50% { filter: drop-shadow(0 0 20px rgba(0,212,255,.9)); }
  100% { filter: drop-shadow(0 0 8px rgba(0,212,255,.5)); }
}

.logo-title {
  font-family: var(--display);
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 6px;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.logo-sub {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 4px;
  text-transform: uppercase;
}

/* Card */
.card {
  background: rgba(4,15,28,.9);
  border: 1px solid var(--border-bright);
  border-radius: 4px;
  padding: 36px 32px;
  backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
  animation: scanLine 3s ease-in-out infinite;
}
@keyframes scanLine {
  0%,100% { opacity: .4; }
  50% { opacity: 1; }
}

.card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.card-header-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent2);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

.card-header-text {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--text-dim);
  text-transform: uppercase;
}

/* Form */
.field {
  margin-bottom: 20px;
}

.field label {
  display: block;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.field input {
  width: 100%;
  background: rgba(0,212,255,.04);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  padding: 11px 14px;
  border-radius: 2px;
  outline: none;
  transition: border-color .2s, background .2s;
  letter-spacing: 1px;
}

.field input:focus {
  border-color: var(--accent);
  background: rgba(0,212,255,.07);
}

.field input::placeholder { color: var(--text-dim); }

/* Error */
.error-msg {
  display: none;
  background: rgba(255,61,61,.1);
  border: 1px solid rgba(255,61,61,.4);
  color: var(--danger);
  font-size: 11px;
  padding: 10px 14px;
  border-radius: 2px;
  margin-bottom: 18px;
  letter-spacing: .5px;
  animation: shake .3s ease;
}
.error-msg.show { display: block; }
@keyframes shake {
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-6px)}
  75%{transform:translateX(6px)}
}

/* Submit button */
.submit-btn {
  width: 100%;
  padding: 13px;
  background: rgba(0,212,255,.1);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-family: var(--display);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}

.submit-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(0,212,255,.15), transparent);
  transform: translateX(-100%);
  transition: transform .4s;
}

.submit-btn:hover { background: rgba(0,212,255,.2); box-shadow: 0 0 20px rgba(0,212,255,.3); }
.submit-btn:hover::before { transform: translateX(100%); }
.submit-btn:active { transform: scale(.98); }
.submit-btn:disabled { opacity: .5; cursor: not-allowed; }

/* Loading state */
.submit-btn.loading::after {
  content: '';
  display: inline-block;
  width: 12px; height: 12px;
  border: 2px solid rgba(0,212,255,.3);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin-left: 10px;
  vertical-align: middle;
}
@keyframes spin { to{transform:rotate(360deg)} }

/* Footer */
.login-footer {
  text-align: center;
  margin-top: 24px;
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 2px;
}

.attempts-left {
  font-size: 9px;
  color: var(--text-dim);
  text-align: right;
  margin-top: 4px;
}

/* Typing animation for placeholder */
.typed-placeholder { animation: typedIn .5s ease forwards; }
@keyframes typedIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="login-wrap">
  <div class="logo-area">
    <div class="hex-logo">
      <svg width="64" height="64" viewBox="0 0 64 64">
        <polygon points="32,4 60,20 60,44 32,60 4,44 4,20" stroke="#00d4ff" stroke-width="2" fill="rgba(0,212,255,.07)"/>
        <polygon points="32,14 52,26 52,38 32,50 12,38 12,26" stroke="#00d4ff" stroke-width="1.5" fill="rgba(0,212,255,.1)"/>
        <polygon points="32,22 44,29 44,35 32,42 20,35 20,29" stroke="#00d4ff" stroke-width="1" fill="rgba(0,212,255,.15)"/>
        <circle cx="32" cy="32" r="5" fill="#00d4ff"/>
        <line x1="32" y1="4" x2="32" y2="14" stroke="#00d4ff" stroke-width="1"/>
        <line x1="60" y1="20" x2="52" y2="26" stroke="#00d4ff" stroke-width="1"/>
        <line x1="60" y1="44" x2="52" y2="38" stroke="#00d4ff" stroke-width="1"/>
        <line x1="32" y1="60" x2="32" y2="50" stroke="#00d4ff" stroke-width="1"/>
        <line x1="4" y1="44" x2="12" y2="38" stroke="#00d4ff" stroke-width="1"/>
        <line x1="4" y1="20" x2="12" y2="26" stroke="#00d4ff" stroke-width="1"/>
      </svg>
    </div>
    <div class="logo-title">GCP Sentinel</div>
    <div class="logo-sub">Cloud Security AI — Restricted Access</div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-header-dot"></div>
      <span class="card-header-text">Authentication Required</span>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="field typed-placeholder">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username" autofocus>
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>

    <button class="submit-btn" id="loginBtn" onclick="doLogin()">
      AUTHENTICATE
    </button>

    <div class="attempts-left" id="attemptsLeft"></div>
  </div>

  <div class="login-footer">
    GCP SENTINEL v2 · ALL ACCESS ATTEMPTS ARE LOGGED AND MONITORED
  </div>
</div>

<script>
let attempts = 0;

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('loginBtn');
  const errEl    = document.getElementById('errorMsg');

  if (!username || !password) {
    showError('Username and password are required.');
    return;
  }

  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = 'AUTHENTICATING';
  errEl.classList.remove('show');

  try {
    const res  = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();

    if (data.ok) {
      btn.textContent = '✓ ACCESS GRANTED';
      btn.style.borderColor = 'var(--accent2)';
      btn.style.color = 'var(--accent2)';
      setTimeout(() => window.location.href = '/', 600);
    } else {
      attempts++;
      showError(data.error || 'Authentication failed.');
      document.getElementById('attemptsLeft').textContent =
        attempts >= 3 ? `⚠ ${5 - attempts} attempts remaining before lockout` : '';
      btn.disabled = false;
      btn.classList.remove('loading');
      btn.textContent = 'AUTHENTICATE';
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  } catch(e) {
    showError('Connection error. Is the server running?');
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.textContent = 'AUTHENTICATE';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = '⚠ ' + msg;
  el.classList.remove('show');
  void el.offsetWidth; // reflow for animation
  el.classList.add('show');
}
</script>
</body>
</html>
